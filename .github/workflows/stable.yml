name: Stable Build and Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build Package
        id: build_package
        run: ./build.sh --stable --download-deps

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(make print-version BUILD_TYPE=stable)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          TITLE=$(echo "${VERSION}" | cut -d'-' -f1)
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          LAST_STABLE_TAG=$(git tag --sort=-creatordate | grep -v "\-dev\-" | grep -v "^${VERSION}$" | head -n 1)
          echo "last_stable_tag=${LAST_STABLE_TAG}" >> $GITHUB_OUTPUT

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.get_version.outputs.title }}
          prerelease: false
          body: |
            - ### Changelog:

            **Full Changelog (since last stable release)**: https://github.com/itsPLK/ps5_y2jb_autoloader/compare/${{ steps.get_version.outputs.last_stable_tag }}...${{ steps.get_version.outputs.version }}

            ---
            <details>
            <summary>Bundled Binaries</summary>

            This build integrates the following external dependency versions:
            - [itsPLK/ps5-elfldr](https://github.com/itsPLK/ps5-elfldr): [${{ steps.build_package.outputs.elfldr_ver }}](https://github.com/itsPLK/ps5-elfldr/releases/tag/${{ steps.build_package.outputs.elfldr_ver }})
            - [itsPLK/ps5-kexp](https://github.com/itsPLK/ps5-kexp): [${{ steps.build_package.outputs.kexp_ver }}](https://github.com/itsPLK/ps5-kexp/releases/tag/${{ steps.build_package.outputs.kexp_ver }})
            - [itsPLK/ps5-unified-autoloader](https://github.com/itsPLK/ps5-unified-autoloader): [${{ steps.build_package.outputs.unified_autoloader_ver }}](https://github.com/itsPLK/ps5-unified-autoloader/releases/tag/${{ steps.build_package.outputs.unified_autoloader_ver }})

            </details>
          files: 'y2jb_update.zip'
