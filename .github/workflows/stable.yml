name: Stable Build and Release

on:
  workflow_dispatch:
    inputs:
      pldmgr_ref:
        description: "payload-manager git ref (branch/tag/SHA)"
        required: false
        default: "feature/cyberpunk-2077-theme"
      pldmgr_repo:
        description: "payload-manager git URL"
        required: false
        default: "https://github.com/amilarajans/ps5-payload-manager.git"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node (pldmgr frontend fallback)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build package (themed pldmgr + y2jb_update.zip)
        id: build_package
        env:
          PLDMGR_REF: ${{ inputs.pldmgr_ref || 'feature/cyberpunk-2077-theme' }}
          PLDMGR_REPO: ${{ inputs.pldmgr_repo || 'https://github.com/amilarajans/ps5-payload-manager.git' }}
        run: |
          chmod +x ./scripts/ci_build.sh
          ./scripts/ci_build.sh --stable \
            --pldmgr-ref "${PLDMGR_REF}" \
            --pldmgr-repo "${PLDMGR_REPO}"

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(make print-version BUILD_TYPE=stable)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TITLE=$(echo "${VERSION}" | cut -d'-' -f1)
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          LAST_STABLE_TAG=$(git tag --sort=-creatordate | grep -v "\-dev\-" | grep -v "^${VERSION}$" | head -n 1 || true)
          echo "last_stable_tag=${LAST_STABLE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.get_version.outputs.title }}
          prerelease: false
          body: |
            ### Stable release (fork)

            **Repo:** `${{ github.repository }}`
            **Commit:** `${{ github.sha }}`

            **Full Changelog** (if prior tag exists): https://github.com/${{ github.repository }}/compare/${{ steps.get_version.outputs.last_stable_tag }}...${{ steps.get_version.outputs.version }}

            ---
            <details>
            <summary>Bundled binaries</summary>

            | Component | Version / ref |
            |-----------|----------------|
            | [ps5-elfldr](https://github.com/itsPLK/ps5-elfldr) | `${{ steps.build_package.outputs.elfldr_ver }}` |
            | [ps5-kexp](https://github.com/itsPLK/ps5-kexp) | `${{ steps.build_package.outputs.kexp_ver }}` |
            | [ps5-unified-autoloader](https://github.com/itsPLK/ps5-unified-autoloader) (built in CI) | `${{ steps.build_package.outputs.unified_autoloader_ver }}` |
            | [ps5-payload-manager](https://github.com/amilarajans/ps5-payload-manager) (**themed**) | `${{ steps.build_package.outputs.pldmgr_ref }}` @ `${{ steps.build_package.outputs.pldmgr_sha }}` (`${{ steps.build_package.outputs.pldmgr_ver }}`) |

            Unified autoloader is **built from the monorepo submodule** with this fork's payload-manager checked out and compiled (not the stock itsPLK release ELF).

            </details>
          files: y2jb_update.zip
